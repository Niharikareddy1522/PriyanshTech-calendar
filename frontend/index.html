<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Priyansh Technologies - Smart Calendar</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">

    <!-- EmailJS SDK -->
    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>

    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="dashboard">

        <!-- SIDEBAR -->
        <aside class="sidebar sidebar-collapsed" id="appSidebar">
            <img src="public/priyanshlogo.png" alt="Priyansh Technologies Logo" class="sidebar-logo">
            <div id="liveClock" class="clock mt-2"></div>
            <hr class="sidebar-divider">
            <div id="miniCalendar"></div>
            <hr class="sidebar-divider">
            <button class="btn btn-primary w-100 mt-1" id="addEventBtn">
                <i class="bi bi-plus-circle me-1"></i> Add Event
            </button>
            <button class="btn btn-outline-light w-100 mt-2" id="weeklyReportBtn">
                <i class="bi bi-bar-chart-line me-1"></i> Weekly Report
            </button>
        </aside>

        <!-- MAIN -->
        <main class="main-content">

            <div class="topbar">
                <!-- Left: hamburger menu + Prev button -->
                <div class="topbar-left-outer">
                    <button class="btn btn-sm sidebar-toggle-btn" id="sidebarToggleBtn" title="Toggle Sidebar"
                        aria-label="Toggle Sidebar">
                        <i class="bi bi-list fs-5"></i>
                    </button>
                    <button class="nav-arrow-btn" id="prevBtn" aria-label="Previous">◀</button>
                </div>

                <!-- Center: Month/Year title -->
                <h4 id="monthYear" class="mb-0 topbar-title"></h4>

                <!-- Right: Today + Next + View toggle + Dark mode -->
                <div class="topbar-right-outer">
                    <button class="btn btn-outline-primary btn-sm" id="todayBtn">Today</button>
                    <button class="nav-arrow-btn" id="nextBtn" aria-label="Next">▶</button>
                    <div class="view-toggle" id="viewToggle">
                        <button class="view-toggle-btn active" data-view="month" id="monthViewBtn">
                            <i class="bi bi-grid-3x3-gap-fill me-1"></i>Month
                        </button>
                        <button class="view-toggle-btn" data-view="week" id="weekViewBtn">
                            <i class="bi bi-calendar-week me-1"></i>Week
                        </button>
                    </div>
                    <button class="btn btn-outline-secondary btn-sm rounded-circle" id="toggleDark"
                        title="Toggle Dark Mode"
                        style="width:30px;height:30px;padding:0;display:flex;align-items:center;justify-content:center;">🌙</button>
                </div>
            </div>


            <div class="calendar-grid" id="calendar"></div>

            <!-- CATEGORY BAR -->
            <div class="category-bar" id="categoryBar">
                <div class="category-bar-labels" id="categoryLabels"></div>
                <div class="category-bar-segments" id="categorySegments"></div>
            </div>

        </main>

    </div>
    <!-- EVENT MODAL -->
    <div class="modal fade" id="eventModal" tabindex="-1">
        <div class="modal-dialog modal-lg">
            <div class="modal-content event-modal-content">

                <div class="modal-header event-modal-header">
                    <h5 class="modal-title" id="modalHeading">
                        <i class="bi bi-calendar-plus me-2"></i>Add Event
                    </h5>
                    <button class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>

                <div class="modal-body p-4">

                    <input type="hidden" id="selectedDate">
                    <input type="hidden" id="editIndex">

                    <!-- Title -->
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Event Title <span class="text-danger">*</span></label>
                        <input type="text" id="eventTitle" class="form-control" placeholder="Enter event title...">
                    </div>

                    <!-- Date & Time row -->
                    <div class="row g-3 mb-3">
                        <div class="col-md-4">
                            <label class="form-label fw-semibold">Date <span class="text-danger">*</span></label>
                            <input type="date" id="eventDate" class="form-control">
                        </div>
                        <div class="col-md-4">
                            <label class="form-label fw-semibold">Start Time</label>
                            <div class="time-picker-group" id="startTimePicker">
                                <select id="startHour" class="form-select time-picker-select" title="Hour">
                                    <option value="">--</option>
                                    <option value="12">12</option>
                                    <option value="1">1</option>
                                    <option value="2">2</option>
                                    <option value="3">3</option>
                                    <option value="4">4</option>
                                    <option value="5">5</option>
                                    <option value="6">6</option>
                                    <option value="7">7</option>
                                    <option value="8">8</option>
                                    <option value="9">9</option>
                                    <option value="10">10</option>
                                    <option value="11">11</option>
                                </select>
                                <span class="time-picker-sep">:</span>
                                <select id="startMinute" class="form-select time-picker-select" title="Minute">
                                    <option value="00">00</option>
                                    <option value="10">10</option>
                                    <option value="15">15</option>

                                    <option value="30">30</option>
                                    <option value="45">45</option>
                                </select>
                                <select id="startAmPm" class="form-select time-picker-select time-picker-ampm"
                                    title="AM/PM">
                                    <option value="AM">AM</option>
                                    <option value="PM">PM</option>
                                </select>
                            </div>
                            <!-- hidden field keeps 24h value for the rest of the JS -->
                            <input type="hidden" id="eventStartTime">
                        </div>
                        <div class="col-md-4">
                            <label class="form-label fw-semibold">Duration</label>
                            <select id="eventDuration" class="form-select">
                                <option value="15 min">15 minutes</option>
                                <option value="25 min">25 minutes</option>
                                <option value="30 min">30 minutes</option>
                                <option value="45 min">45 minutes</option>
                                <option value="1 hr" selected>1 hour</option>
                                <option value="1.5 hr">1.5 hours</option>
                                <option value="2 hr">2 hours</option>
                                <option value="2.5hr">2.5 hours</option>
                                <option value="3 hr">3 hours</option>
                                <option value="4 hr">4 hours</option>
                                <option value="All day">All day</option>
                            </select>

                        </div>
                    </div>

                    <!-- Description -->
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Description</label>
                        <textarea id="eventNotes" class="form-control" rows="2"
                            placeholder="Add description or notes..."></textarea>
                    </div>

                    <!-- Color Category -->
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Category</label>
                        <div class="color-category-group">
                            <button type="button" class="color-cat-btn" data-color="#e53935" id="catRed">
                                <span class="cat-dot" style="background:#e53935;"></span> 🚨 Emergency
                            </button>
                            <button type="button" class="color-cat-btn" data-color="#1a73e8" id="catHoliday">
                                <span class="cat-dot" style="background:#1a73e8;"></span> 🌿 Holiday
                            </button>
                            <button type="button" class="color-cat-btn" data-color="#f9a825" id="catYellow">
                                <span class="cat-dot" style="background:#f9a825;"></span> 🔔 Reminder
                            </button>
                            <button type="button" class="color-cat-btn active-cat" data-color="#43a047" id="catEvent">
                                <span class="cat-dot" style="background:#43a047;"></span> 📅 Event
                            </button>
                        </div>
                        <input type="hidden" id="eventColor" value="#43a047">
                    </div>


                    <!-- Reminder Section -->
                    <div class="reminder-box mb-2">
                        <div class="form-check mb-2">
                            <input type="checkbox" id="eventReminder" class="form-check-input">
                            <label class="form-check-label fw-semibold" for="eventReminder">
                                <i class="bi bi-bell me-1"></i> Enable Reminder
                            </label>
                        </div>
                        <div id="reminderFields" class="row g-2" style="display:none!important;">
                            <div class="col-md-6">
                                <label class="form-label small">Reminder Date <span class="text-danger">*</span></label>
                                <input type="date" id="reminderDate" class="form-control form-control-sm">
                            </div>
                            <div class="col-md-6">
                                <label class="form-label small">Reminder Time <span class="text-danger">*</span></label>
                                <div class="time-picker-group time-picker-sm" id="reminderTimePicker">
                                    <select id="reminderHour" class="form-select form-select-sm time-picker-select"
                                        title="Hour">

                                        <option value="12">12</option>
                                        <option value="1">1</option>
                                        <option value="2">2</option>
                                        <option value="3">3</option>
                                        <option value="4">4</option>
                                        <option value="5">5</option>
                                        <option value="6">6</option>
                                        <option value="7">7</option>
                                        <option value="8">8</option>
                                        <option value="9">9</option>
                                        <option value="10">10</option>
                                        <option value="11">11</option>
                                    </select>
                                    <span class="time-picker-sep">:</span>
                                    <select id="reminderMinute" class="form-select form-select-sm time-picker-select"
                                        title="Minute">
                                        <option value="00">00</option>
                                        <option value="15">15</option>
                                        <option value="10">10</option>
                                        <option value="30">30</option>
                                        <option value="45">45</option>
                                    </select>
                                    <select id="reminderAmPm"
                                        class="form-select form-select-sm time-picker-select time-picker-ampm"
                                        title="AM/PM">
                                        <option value="AM">AM</option>
                                        <option value="PM">PM</option>
                                    </select>
                                </div>
                                <!-- hidden field keeps 24h value for the rest of the JS -->
                                <input type="hidden" id="reminderTime">
                            </div>
                        </div>
                    </div>

                </div><!-- /modal-body -->

                <div class="modal-footer event-modal-footer">
                    <button class="btn btn-outline-danger me-auto" id="deleteEventBtn">
                        <i class="bi bi-trash"></i> Delete
                    </button>
                    <button class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                    <button class="btn btn-primary px-4" id="saveEventBtn">
                        <i class="bi bi-check-lg"></i> Save Event
                    </button>
                </div>

            </div>
        </div>
    </div>
    <!-- WEEKLY REPORT MODAL -->
    <div class="modal fade" id="weeklyReportModal" tabindex="-1">
        <div class="modal-dialog modal-xl modal-dialog-scrollable">
            <div class="modal-content weekly-report-content">
                <div class="modal-header weekly-report-header">
                    <div class="d-flex align-items-center gap-3">
                        <i class="bi bi-bar-chart-line fs-4"></i>
                        <div>
                            <h5 class="modal-title mb-0" id="weeklyReportTitle">Weekly Report</h5>
                            <small id="weeklyReportRange" class="opacity-75"></small>
                        </div>
                    </div>
                    <div class="d-flex align-items-center gap-3 flex-wrap">
                        <!-- Week navigation (self-contained — does NOT affect main calendar) -->
                        <span id="reportThisWeekBadge"
                            class="badge bg-success px-2 py-1 d-inline-flex align-items-center gap-1">
                            <i class="bi bi-calendar-check me-1"></i>This Week
                        </span>
                        <div class="d-flex align-items-center gap-1">
                            <button class="btn btn-sm btn-outline-light wr-nav-btn" id="reportPrevWeekBtn"
                                title="Previous Week">
                                <i class="bi bi-chevron-left"></i> Prev
                            </button>
                            <button class="btn btn-sm btn-outline-light wr-nav-btn" id="reportNextWeekBtn"
                                title="Next Week">
                                Next <i class="bi bi-chevron-right"></i>
                            </button>
                        </div>
                        <span id="weeklyReportTotalBadge" class="badge bg-light text-dark fs-6 px-3 py-2"></span>
                        <button class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                    </div>
                </div>
                <div class="modal-body p-0" id="weeklyReportBody"></div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

    <!-- Firebase SDK (Real-time cross-device sync) -->
    <script type="module" src="app.js"></script>
</body>

</html>
